name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

defaults:
  run:
    working-directory: cpp

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            preset: windows-msvc-release
          - os: ubuntu-latest
            preset: linux-gcc-release
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Ninja (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Configure
        run: cmake --preset ${{ matrix.preset }} -DSNMPMON_BUILD_TESTS=ON

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test
        working-directory: cpp/build/${{ matrix.preset }}
        run: ctest -C Release --output-on-failure
